version: "3.8"

services:
  redirector:
    image: caddy:alpine
    container_name: phantom-redirector
    restart: unless-stopped
    ports:
      - "80:80"     # HTTP challenge + HTTP→HTTPS redirect
      - "443:443"   # HTTPS — www.YOUR_DOMAIN.com
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - redir_net

volumes:
  caddy_data:
  caddy_config:

networks:
  redir_net:
    driver: bridge
